name: Build ARMv7

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  GO_VERSION: '1.21'
  BINARY_NAME: zeroclawdash

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  build-armv7:
    name: Build ARMv7
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(date +%Y%m%d)-${GITHUB_SHA::7}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build ARMv7 binary
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          go build -ldflags "-X main.version=$VERSION" -o ${{ env.BINARY_NAME }} main.go

      - name: Generate checksum
        run: |
          sha256sum ${{ env.BINARY_NAME }} > ${{ env.BINARY_NAME }}.sha256
          cat ${{ env.BINARY_NAME }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclawdash-armv7
          path: |
            ${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}.sha256

  release:
    name: Create Release
    needs: build-armv7
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Debug context
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Ref type: ${{ github.ref_type }}"
          echo "Tag name: ${{ github.ref_name }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: zeroclawdash-armv7
          path: ./release

      - name: Display files
        run: |
          ls -lh ./release
          cat ./release/${{ env.BINARY_NAME }}.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release/${{ env.BINARY_NAME }}
            ./release/${{ env.BINARY_NAME }}.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-summary:
    name: Build Summary
    needs: build-armv7
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: zeroclawdash-armv7
          path: ./artifacts

      - name: Display build info
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** Linux ARMv7 (玩客云/Armbian)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Binary:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh ./artifacts >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SHA256 Checksum:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat ./artifacts/${{ env.BINARY_NAME }}.sha256 >> $GITHUB_STEP_SUMMARY
